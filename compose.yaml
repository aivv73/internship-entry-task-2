services:
  candidate-service:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://payment:payment@postgres:5432/payments
      PROVIDER_URL: http://provider-simulator:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8080/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  provider-simulator:
    image: ghcr.io/fintech-dev-lab/internship-provider-simulator:v0.2.0
    environment:
      CALLBACK_URL: http://candidate-service:8080/receipts
      SIMULATOR_MODE: ${SIMULATOR_MODE:-success}
    ports:
      - "8081:8081"
    depends_on:
      candidate-service:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - candidate-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U payment -d payments"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  candidate-data:
